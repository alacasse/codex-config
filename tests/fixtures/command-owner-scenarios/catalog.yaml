  - root-generation-isolation
  - branch-design-lineage
  - candidate-validation
  - installer-cutover
  - physical-deletion
  - contract-first-format
  - planning-state-ledger
  - planning-quality
  - execution-currentness
  - cutover-lifecycle
forbidden_target_terms:
  - architecture-program-runway
  - batch-runway
  - create-spec
  - execute-spec
  - closeout-runway
  - preflight_cross_checkout_live_lease
  - prepare_cross_checkout_context_refresh
scenarios:
  - id: planning-partial-selection-resumes
    family: planning-fault-injection
    evidence_kind: fault_injection
    contracts: []
    initial_artifacts: &workflow_inputs [workflow-cases.yaml]
    command: planning.resume-selection
    expected_transition: planning:queued
    expected_writes: &planning_writes
      - workspace/CURRENT.md
      - workspace/dispatch.md
      - workspace/runway.md
      - workspace/selection.md
    forbidden_writes: &forbidden_writes
      - outside/canonical-planning
      - outside/installed-home
    expected_stop_reason: planning stops before implementation
    generation_and_roots: &fixture_roots
      generation: fixture
      roots:
        - role: workspace
          path: workspace
    validation:
      - planning.transaction.green
      - planning.recovery.green
      - planning.idempotence.green
      - planning.installed-owner.green
    binding: &planning_binding
      status: bound
      adapter: workflow_adapters.py:observe_planning
      reason: null
