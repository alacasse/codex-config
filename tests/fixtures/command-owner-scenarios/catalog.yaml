      - INTAKE-SOURCE-001
      - INTAKE-IDENTITY-002
      - INTAKE-NORMALIZE-003
      - INTAKE-MUTATE-004
      - INTAKE-STOP-005
    initial_artifacts: *workflow_inputs
    command: intake.record
    expected_transition: intake:recorded
    expected_writes: [workspace/LEDGER.md]
    forbidden_writes: *forbidden_writes
    expected_stop_reason: intake stops before planning
    generation_and_roots: &installed_intake_roots
      generation: candidate-installed
      roots:
        - role: workspace
          path: workspace
        - role: installed-owner
          path: installed/scripts/add_to_ledger.py
    validation:
      - ledger.store.green
      - intake.installed-owner.green
      - intake.create.green
      - intake.update.green
      - intake.atomicity.green
      - intake.stop.green
    binding: &intake_binding
      status: bound
      adapter: workflow_adapters.py:observe_intake
      reason: null
