  - STATE-CANONICAL-003
  - STATE-HISTORY-004
  - EVIDENCE-LEGACY-001
  - EVIDENCE-DEAD-002
  - EVIDENCE-TEST-003
required_families:
  - intake
  - planning
  - planning-fault-injection
  - execution
  - commit-receipt-fault-injection
  - closeout
