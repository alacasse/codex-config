      - workspace/CURRENT.md
      - workspace/dispatch.md
      - workspace/runway.md
      - workspace/selection.md
    forbidden_writes: &forbidden_writes
      - outside/canonical-planning
      - outside/installed-home
    expected_stop_reason: planning stops before implementation
    generation_and_roots: &fixture_roots
      generation: fixture
      roots:
        - role: workspace
          path: workspace
    validation:
      - planning.transaction.green
      - planning.recovery.green
      - planning.idempotence.green
    binding: &planning_binding
      status: bound
      adapter: workflow_adapters.py:observe_planning
      reason: null
