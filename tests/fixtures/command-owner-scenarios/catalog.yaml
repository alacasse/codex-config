  - EXEC-WORKER-003
  - EXEC-VALIDATE-004
  - EXEC-REVIEW-005
  - EXEC-COMMIT-006
  - EXEC-RECOVER-007
  - EXEC-STOP-008
  - CLOSE-FINAL-001
  - CLOSE-RECONCILE-002
  - CLOSE-NEXT-003
  - STATE-DIAG-001
